services:
  mysql:
    image: mysql:8.0
    container_name: pokeface-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-root123}
      MYSQL_DATABASE: pokeface
      MYSQL_USER: pokeface
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-pokeface123}
    ports:
      - "3306:3306"
    volumes:
      - mysql-data:/var/lib/mysql
      - ./server/migrations:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${MYSQL_ROOT_PASSWORD:-root123}"]
      interval: 5s
      timeout: 3s
      retries: 10

  livekit:
    image: livekit/livekit-server:latest
    container_name: pokeface-livekit
    restart: unless-stopped
    ports:
      - "7880:7880"
      - "7881:7881"
    volumes:
      - ./livekit.yaml:/etc/livekit.yaml
    command: --config /etc/livekit.yaml

  server:
    build:
      context: ./server
      dockerfile: Dockerfile
    container_name: pokeface-server
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      PORT: "8080"
      DATABASE_DSN: "pokeface:${MYSQL_PASSWORD:-pokeface123}@tcp(mysql:3306)/pokeface?parseTime=true"
      JWT_SECRET: ${JWT_SECRET:-change-me-in-production}
      ALLOWED_ORIGINS: ${ALLOWED_ORIGINS:-http://localhost:3000}
    depends_on:
      mysql:
        condition: service_healthy

volumes:
  mysql-data:
